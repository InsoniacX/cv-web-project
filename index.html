<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsyad Rianda Putra - Curriculum Vitae</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="bg-black sticky top-0 z-50 shadow-md jetbrains-mono">
      <div class="max-w-6xl mx-auto px-6">
        <div class="flex items-center justify-between h-16">
          <!-- Logo -->
          <a
            href="#"
            class="text-white font-bold text-md uppercase tracking-wide"
            >InscX // Junior Full-Stack</a
          >

          <!-- Desktop Nav Links -->
          <div class="hidden md:flex items-center gap-8">
            <a
              href="#home"
              class="text-gray-100 hover:text-white text-sm font-medium uppercase tracking-widest transition-colors duration-200"
              >Home</a
            >
            <a
              href="#about"
              class="text-gray-100 hover:text-white text-sm font-medium uppercase tracking-widest transition-colors duration-200"
              >About</a
            >
            <a
              href="#projects"
              class="text-gray-100 hover:text-white text-sm font-medium uppercase tracking-widest transition-colors duration-200"
              >Projects</a
            >
            <a
              href="#contact"
              class="text-gray-100 hover:text-white text-sm font-medium uppercase tracking-widest transition-colors duration-200"
              >Contact</a
            >
          </div>

          <button
            id="hamburger-btn"
            class="md:hidden flex flex-col justify-center items-center w-10 h-10 gap-[6px] rounded hover:bg-white/10 transition-colors duration-200 focus:outline-none"
            onclick="toggleMenu()"
            aria-label="Toggle menu"
          >
            <svg
              id="icon-open"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              viewBox="0 0 24 24"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
            <svg
              id="icon-close"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              viewBox="0 0 24 24"
              class="hidden"
            >
              <line x1="6" y1="6" x2="18" y2="18" />
              <line x1="18" y1="6" x2="6" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <div
        id="mobile-menu"
        class="mobile-menu md:hidden bg-gray-black border-t border-white/10"
      >
        <a
          href="#home"
          class="block px-6 py-4 text-gray-100 hover:text-white hover:bg-white/10 text-sm font-medium uppercase tracking-widest border-b border-white/10 transition-all duration-200"
          >Home</a
        >
        <a
          href="#about"
          class="block px-6 py-4 text-gray-100 hover:text-white hover:bg-white/10 text-sm font-medium uppercase tracking-widest border-b border-white/10 transition-all duration-200"
          >About</a
        >
        <a
          href="#projects"
          class="block px-6 py-4 text-gray-100 hover:text-white hover:bg-white/10 text-sm font-medium uppercase tracking-widest border-b border-white/10 transition-all duration-200"
          >Projects</a
        >
        <a
          href="#contact"
          class="block px-6 py-4 text-gray-100 hover:text-white hover:bg-white/10 text-sm font-medium uppercase tracking-widest transition-all duration-200"
          >Contact</a
        >
      </div>
    </nav>
    <main class="bg-gray-800 w-full image-grid-template">
      <section id="hero" class="h-screen overflow-hidden">
        <div class="glow-container">
          <div
            class="glow-orb w-[600px] h-[600px] md:w-[800px] md:h-[800px]"
            id="glowOrb"
          ></div>
        </div>

        <div class="flex flex-col md:flex-row md:h-full relative z-10">
          <div
            class="flex flex-1 py-12 flex-col justify-center text-center items-center md:text-start md:pl-16"
          >
            <div class="text-white space-y-4">
              <h2 class="text-5xl my-4 cormorant-garamond italic">
                Arsyad <br /><span class="not-italic">Rianda Putra</span>
              </h2>
              <p class="jetbrains-mono uppercase my-4 text-gray-400">
                Junior Full-Stack Developer
              </p>
            </div>
            <div class="flex text-white jetbrains-mono gap-6 mt-6">
              <a
                href=""
                class="px-4 py-2 bg-[#c9a76f] border-2 border-blue-500 hover:bg-white hover:text-blue-500 transition-colors duration-200"
                >My Works</a
              >
              <a
                href=""
                class="px-4 py-2 bg-blue-500 border-2 border-blue-500 hover:bg-white hover:text-blue-500 transition-colors duration-200"
                >Reach Me</a
              >
            </div>
          </div>

          <div class="flex-1 flex items-center justify-center">
            <div class="relative w-[360px] h-[440px] lg:w-[520px] lg:h-[600px]">
              <span
                class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-[#c9a76f] z-10"
              ></span>
              <span
                class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-[#c9a76f] z-10"
              ></span>
              <span
                class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-[#c9a76f] z-10"
              ></span>
              <span
                class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-[#c9a76f] z-10"
              ></span>

              <div class="w-full h-full overflow-hidden">
                <img
                  src="https://preview.redd.it/why-this-armor-of-all-v0-b4sytx095xnc1.jpg?width=1100&format=pjpg&auto=webp&s=9de65cd3200a185630442eb4620ef66d6e98f526"
                  alt="Profile"
                  class="w-full h-full object-cover object-top z-10"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
      <section id="about"></section>
      <section id="project"></section>
      <section id="contact"></section>
    </main>
    <footer></footer>
    <script src="js/index.js"></script>
  </body>
</html>
